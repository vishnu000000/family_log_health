<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Nutrition Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f9;
}

nav {
  display: flex;
  background: #222;
}

nav button {
  flex: 1;
  padding: 15px;
  border: none;
  color: white;
  background: #222;
  cursor: pointer;
}

nav button:hover {
  background: #444;
}

.member {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

.task {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.task h4 {
  margin: 0 0 5px 0;
}

button.verify {
  background: green;
  color: white;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  margin-top: 5px;
}

.reset-btn {
  background: red;
  color: white;
  padding: 8px 15px;
  border: none;
  margin-top: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
  <button onclick="showMember('m49')">49M</button>
  <button onclick="showMember('f40')">40F</button>
  <button onclick="showMember('m22')">22M</button>
  <button onclick="showMember('f19')">19F</button>
</nav>

<div id="content"></div>

<script>

const adminPassword = "1234"; // CHANGE THIS

const members = {

m49: {
name: "49M - BP & Stamina",
tasks: [
{ id:"49_chia", name:"Chia/Sabja (Daily)", required:1 },
{ id:"49_flax", name:"Flax (Daily)", required:1 },
{ id:"49_pumpkin", name:"Pumpkin Seeds (Daily)", required:1 },
{ id:"49_egg", name:"Egg (Daily)", required:1 },
{ id:"49_chicken", name:"Chicken (3/week)", required:3 },
{ id:"49_fish", name:"Fish (2/week)", required:2 },
{ id:"49_mutton", name:"Mutton (1/week)", required:1 }
]},

f40: {
name: "40F - Immunity & Strength",
tasks: [
{ id:"40_sesame", name:"Sesame (4/week)", required:4 },
{ id:"40_flax", name:"Flax (Daily)", required:1 },
{ id:"40_pumpkin", name:"Pumpkin (Daily)", required:1 },
{ id:"40_egg", name:"Egg (Daily)", required:1 },
{ id:"40_chicken", name:"Chicken (3/week)", required:3 },
{ id:"40_fish", name:"Fish (2/week)", required:2 },
{ id:"40_mutton", name:"Mutton (1/week)", required:1 }
]},

m22: {
name: "22M - Gym & Muscle",
tasks: [
{ id:"22_chia", name:"Chia/Sabja (Daily)", required:1 },
{ id:"22_flax", name:"Flax (Daily)", required:1 },
{ id:"22_pumpkin", name:"Pumpkin (Daily)", required:1 },
{ id:"22_egg", name:"Egg (Daily)", required:1 },
{ id:"22_whey", name:"Whey (3/week)", required:3 },
{ id:"22_chicken", name:"Chicken (4/week)", required:4 },
{ id:"22_fish", name:"Fish (2/week)", required:2 }
]},

f19: {
name: "19F - Weight Gain",
tasks: [
{ id:"19_sesame", name:"Sesame (Daily)", required:1 },
{ id:"19_flax", name:"Flax (Daily)", required:1 },
{ id:"19_pumpkin", name:"Pumpkin (Daily)", required:1 },
{ id:"19_egg", name:"Egg (Daily)", required:1 },
{ id:"19_chicken", name:"Chicken (3/week)", required:3 },
{ id:"19_fish", name:"Fish (2/week)", required:2 },
{ id:"19_mutton", name:"Mutton (1/week)", required:1 }
]}

};

function showMember(key){
  const content = document.getElementById("content");
  content.innerHTML = "";
  const member = members[key];

  const container = document.createElement("div");
  container.className = "member active";

  const title = document.createElement("h2");
  title.innerText = member.name;
  container.appendChild(title);

  member.tasks.forEach(task=>{
    const div = document.createElement("div");
    div.className="task";

    const count = localStorage.getItem(task.id) || 0;

    div.innerHTML = `
      <h4>${task.name}</h4>
      <p>Uploaded: <span id="${task.id}_count">${count}</span> / ${task.required}</p>
      <input type="file" multiple onchange="upload('${task.id}', ${task.required}, this.files.length)">
      <br>
      <button class="verify" onclick="verify('${task.id}')">Verify</button>
      <input type="checkbox" id="${task.id}_check" disabled>
    `;

    container.appendChild(div);
  });

  const resetBtn = document.createElement("button");
  resetBtn.innerText="Reset Weekly Data";
  resetBtn.className="reset-btn";
  resetBtn.onclick=resetData;
  container.appendChild(resetBtn);

  content.appendChild(container);
}

function upload(id, required, filesCount){
  let current = parseInt(localStorage.getItem(id) || 0);
  current += filesCount;
  localStorage.setItem(id, current);
  document.getElementById(id+"_count").innerText = current;

  if(current >= required){
    document.getElementById(id+"_check").disabled = false;
  }
}

function verify(id){
  const pass = prompt("Enter Admin Password");
  if(pass === adminPassword){
    document.getElementById(id+"_check").checked = true;
  } else {
    alert("Wrong password");
  }
}

function resetData(){
  if(confirm("Reset all weekly data?")){
    localStorage.clear();
    location.reload();
  }
}

showMember('m49');

</script>

</body>
</html>
