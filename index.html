<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Nutrition Weekly Tracker</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#333;
}

nav{
  display:flex;
  background:rgba(0,0,0,0.3);
}

nav button{
  flex:1;
  padding:15px;
  border:none;
  background:transparent;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}
nav button:hover{background:rgba(255,255,255,0.2);}

.container{padding:25px;}

.card{
  background:white;
  border-radius:15px;
  padding:25px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  animation:fade 0.3s ease-in-out;
}

.task{
  background:#f7f8ff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  border-left:5px solid #667eea;
}

.checkbox-group{
  margin-top:10px;
}

.checkbox-group input{
  margin-right:6px;
  transform:scale(1.2);
}

.instructions{
  background:#eef1ff;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

.reset-btn{
  background:#dc3545;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
  margin-top:15px;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<nav>
<button onclick="showMember('m49')">Appala Naidu</button>
<button onclick="showMember('f40')">SatyaVathi</button>
<button onclick="showMember('m22')">Vishnu Vardhan</button>
<button onclick="showMember('f19')">Sharmila</button>
</nav>

<div class="container">
<div id="content"></div>
</div>

<script>

const adminPassword="1234";

const members={

m49:{
name:"Appala Naidu – BP & Stamina",
tasks:[
{ name:"Chia/Sabja (Soaked overnight – Morning empty stomach)", freq:7 },
{ name:"Flax Powder (Mix in breakfast curd)", freq:7 },
{ name:"Pumpkin Seeds (Evening snack)", freq:7 },
{ name:"Eggs – 2 Boiled (Breakfast)", freq:7 },
{ name:"Chicken – 120g Lunch", freq:3 },
{ name:"Fish – 120g Lunch", freq:2 },
{ name:"Mutton – Light portion Lunch", freq:1 }
],
instructions:`
Protein Target: 75–90g/day ✔ Achieved.<br>
Keep salt moderate. Walk after dinner 20 mins.
`
},

f40:{
name:"SatyaVathi – Immunity & Strength",
tasks:[
{ name:"Sesame (Light roasted – Morning)", freq:4 },
{ name:"Flax Powder (Breakfast)", freq:7 },
{ name:"Pumpkin Seeds (Evening)", freq:7 },
{ name:"Eggs – 2 (Breakfast)", freq:7 },
{ name:"Chicken – 100g", freq:3 },
{ name:"Fish – 120g", freq:2 },
{ name:"Mutton – Small portion", freq:1 }
],
instructions:`
Protein Target: 50–60g/day ✔ Achieved.<br>
Add 1 tsp ghee in lunch. Do not skip meals.
`
},

m22:{
name:"Vishnu Vardhan – Muscle Gain",
tasks:[
{ name:"Chia (Soaked – Morning)", freq:7 },
{ name:"Flax Powder (Breakfast)", freq:7 },
{ name:"Pumpkin Seeds (Evening)", freq:7 },
{ name:"Eggs – 2 (Breakfast)", freq:7 },
{ name:"Whey + Banana (Post Workout)", freq:4 },
{ name:"Chicken – 200g (Gym days), 150g normal", freq:4 },
{ name:"Fish – 150g", freq:2 }
],
instructions:`
Protein Target: 100–110g/day ✔ Achieved.<br>
Drink 3L water. Keep carbs sufficient.
`
},

f19:{
name:"Sharmila – Healthy Weight Gain",
tasks:[
{ name:"Sesame (Morning)", freq:7 },
{ name:"Flax Powder (Breakfast)", freq:7 },
{ name:"Pumpkin Seeds (Evening)", freq:7 },
{ name:"Eggs – 2 (Breakfast)", freq:7 },
{ name:"Chicken – 120g", freq:3 },
{ name:"Fish – 120g", freq:2 },
{ name:"Mutton – Small portion", freq:1 }
],
instructions:`
Protein Target: 45–55g/day ✔ Achieved.<br>
Eat full meals. Sleep 7–8 hrs daily.
`
}

};


function showMember(key){
const content=document.getElementById("content");
content.innerHTML="";
const member=members[key];

const card=document.createElement("div");
card.className="card";

card.innerHTML=`<h2>${member.name}</h2>`;

member.tasks.forEach(task=>{
const div=document.createElement("div");
div.className="task";

let checkboxes="";
for(let i=0;i<task.freq;i++){
checkboxes+=`<input type="checkbox" onclick="verify(this,'${task.id}_${i}')">`;
}

div.innerHTML=`
<h4>${task.name} (${task.freq}/week)</h4>
<div class="checkbox-group">${checkboxes}</div>
`;

card.appendChild(div);
});

const instructionDiv=document.createElement("div");
instructionDiv.className="instructions";
instructionDiv.innerHTML=member.instructions;
card.appendChild(instructionDiv);

const resetBtn=document.createElement("button");
resetBtn.className="reset-btn";
resetBtn.innerText="Reset Weekly Checks";
resetBtn.onclick=()=>location.reload();
card.appendChild(resetBtn);

content.appendChild(card);
}

function verify(box,id){
if(!box.checked)return;
const pass=prompt("Enter Admin Password");
if(pass!==adminPassword){
alert("Wrong password");
box.checked=false;
}
}

showMember("m49");

</script>

</body>
</html>
