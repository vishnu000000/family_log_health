<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Nutrition Tracker</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #333;
}

nav {
  display: flex;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

nav button {
  flex: 1;
  padding: 15px;
  border: none;
  color: white;
  background: transparent;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

nav button:hover {
  background: rgba(255,255,255,0.2);
}

.container {
  padding: 30px;
}

.member-card {
  background: white;
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
  animation: fadeIn 0.4s ease-in-out;
}

.task {
  background: #f9f9ff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  border-left: 5px solid #667eea;
}

.task h4 {
  margin: 0 0 5px 0;
}

input[type="file"] {
  margin-top: 5px;
}

button.verify {
  background: #28a745;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
  transition: 0.3s;
}

button.verify:hover {
  background: #218838;
}

.progress-bar {
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  width: 0%;
  transition: width 0.5s ease;
}

.reset-btn {
  background: #dc3545;
  color: white;
  padding: 8px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.reset-btn:hover {
  background: #c82333;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<nav>
  <button onclick="showMember('m49')">Appala Naidu</button>
  <button onclick="showMember('f40')">SatyaVathi</button>
  <button onclick="showMember('m22')">Vishnu Vardhan</button>
  <button onclick="showMember('f19')">Sharmila</button>
</nav>

<div class="container">
  <div id="content"></div>
</div>

<script>

const adminPassword = "1234"; // CHANGE THIS

const members = {

m49: {
name: "Appala Naidu - BP & Stamina",
tasks: [
{ id:"49_chia", name:"Chia/Sabja (Daily)", required:1 },
{ id:"49_flax", name:"Flax (Daily)", required:1 },
{ id:"49_pumpkin", name:"Pumpkin Seeds (Daily)", required:1 },
{ id:"49_egg", name:"Egg (Daily)", required:1 },
{ id:"49_chicken", name:"Chicken (3/week)", required:3 },
{ id:"49_fish", name:"Fish (2/week)", required:2 },
{ id:"49_mutton", name:"Mutton (1/week)", required:1 }
]},

f40: {
name: "SatyaVathi - Immunity & Strength",
tasks: [
{ id:"40_sesame", name:"Sesame (4/week)", required:4 },
{ id:"40_flax", name:"Flax (Daily)", required:1 },
{ id:"40_pumpkin", name:"Pumpkin (Daily)", required:1 },
{ id:"40_egg", name:"Egg (Daily)", required:1 },
{ id:"40_chicken", name:"Chicken (3/week)", required:3 },
{ id:"40_fish", name:"Fish (2/week)", required:2 },
{ id:"40_mutton", name:"Mutton (1/week)", required:1 }
]},

m22: {
name: "Vishnu Vardhan - Gym & Muscle",
tasks: [
{ id:"22_chia", name:"Chia/Sabja (Daily)", required:1 },
{ id:"22_flax", name:"Flax (Daily)", required:1 },
{ id:"22_pumpkin", name:"Pumpkin (Daily)", required:1 },
{ id:"22_egg", name:"Egg (Daily)", required:1 },
{ id:"22_whey", name:"Whey (3/week)", required:3 },
{ id:"22_chicken", name:"Chicken (4/week)", required:4 },
{ id:"22_fish", name:"Fish (2/week)", required:2 }
]},

f19: {
name: "Sharmila - Weight Gain",
tasks: [
{ id:"19_sesame", name:"Sesame (Daily)", required:1 },
{ id:"19_flax", name:"Flax (Daily)", required:1 },
{ id:"19_pumpkin", name:"Pumpkin (Daily)", required:1 },
{ id:"19_egg", name:"Egg (Daily)", required:1 },
{ id:"19_chicken", name:"Chicken (3/week)", required:3 },
{ id:"19_fish", name:"Fish (2/week)", required:2 },
{ id:"19_mutton", name:"Mutton (1/week)", required:1 }
]}

};

function showMember(key){
  const content = document.getElementById("content");
  content.innerHTML = "";
  const member = members[key];

  const card = document.createElement("div");
  card.className = "member-card";

  const title = document.createElement("h2");
  title.innerText = member.name;
  card.appendChild(title);

  let totalRequired = 0;
  let totalDone = 0;

  member.tasks.forEach(task=>{
    totalRequired += task.required;
    let count = parseInt(localStorage.getItem(task.id) || 0);
    totalDone += Math.min(count, task.required);

    const div = document.createElement("div");
    div.className="task";

    div.innerHTML = `
      <h4>${task.name}</h4>
      <p>Uploaded: <span id="${task.id}_count">${count}</span> / ${task.required}</p>
      <input type="file" multiple onchange="upload('${task.id}', ${task.required}, this.files.length)">
      <br>
      <button class="verify" onclick="verify('${task.id}')">Verify</button>
      <input type="checkbox" id="${task.id}_check" disabled>
    `;

    card.appendChild(div);
  });

  const progressPercent = Math.floor((totalDone/totalRequired)*100);

  const progressBar = document.createElement("div");
  progressBar.className="progress-bar";
  progressBar.innerHTML=`<div class="progress-fill" style="width:${progressPercent}%"></div>`;
  card.prepend(progressBar);

  const resetBtn = document.createElement("button");
  resetBtn.innerText="Reset Weekly Data";
  resetBtn.className="reset-btn";
  resetBtn.onclick=resetData;

  card.appendChild(resetBtn);

  content.appendChild(card);
}

function upload(id, required, filesCount){
  let current = parseInt(localStorage.getItem(id) || 0);
  current += filesCount;
  localStorage.setItem(id, current);
  document.getElementById(id+"_count").innerText = current;
  location.reload();
}

function verify(id){
  const pass = prompt("Enter Admin Password");
  if(pass === adminPassword){
    document.getElementById(id+"_check").checked = true;
  } else {
    alert("Wrong password");
  }
}

function resetData(){
  if(confirm("Reset all weekly data?")){
    localStorage.clear();
    location.reload();
  }
}

showMember('m49');

</script>

</body>
</html>
