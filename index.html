<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Nutrition Tracker</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
}

nav{
  display:flex;
  background:rgba(0,0,0,0.3);
}

nav button{
  flex:1;
  padding:15px;
  border:none;
  background:transparent;
  color:white;
  cursor:pointer;
  font-size:15px;
}

nav button:hover{background:rgba(255,255,255,0.2);}

.container{padding:25px;}

.card{
  background:white;
  border-radius:15px;
  padding:25px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.task{
  background:#f7f8ff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  border-left:5px solid #667eea;
}

.upload-box{
  margin-top:8px;
}

.preview{
  margin-top:8px;
}

.preview img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:8px;
  margin-right:6px;
  border:2px solid #ddd;
}

.verify-btn{
  margin-top:8px;
  padding:5px 10px;
  background:#28a745;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.instructions{
  background:#eef1ff;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

.reset-btn{
  background:#dc3545;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  margin-top:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
<button onclick="showMember('m49')">Appala Naidu</button>
<button onclick="showMember('f40')">SatyaVathi</button>
<button onclick="showMember('m22')">Vishnu Vardhan</button>
<button onclick="showMember('f19')">Sharmila</button>
</nav>

<div class="container">
<div id="content"></div>
</div>

<script>

const adminPassword="1234";

const members={

m49:{
name:"Appala Naidu – BP & Stamina",
tasks:[
{ name:"Chia/Sabja (Soaked overnight – Morning)", freq:7 },
{ name:"Flax Powder (Breakfast)", freq:7 },
{ name:"Pumpkin Seeds (Evening)", freq:7 },
{ name:"Eggs – 2 (Breakfast)", freq:7 },
{ name:"Chicken – Lunch", freq:3 },
{ name:"Fish – Lunch", freq:2 },
{ name:"Mutton – Lunch", freq:1 }
],
instructions:`Protein Target: 75–90g/day ✔ Achieved.<br>
Walk 20 mins after dinner.`
},

f40:{
name:"SatyaVathi – Immunity & Strength",
tasks:[
{ name:"Sesame (Morning)", freq:4 },
{ name:"Flax Powder (Breakfast)", freq:7 },
{ name:"Pumpkin (Evening)", freq:7 },
{ name:"Eggs – 2 (Breakfast)", freq:7 },
{ name:"Chicken", freq:3 },
{ name:"Fish", freq:2 },
{ name:"Mutton", freq:1 }
],
instructions:`Protein Target: 50–60g/day ✔ Achieved.<br>
Do not skip meals.`
},

m22:{
name:"Vishnu Vardhan – Muscle Gain",
tasks:[
{ name:"Chia (Morning)", freq:7 },
{ name:"Flax Powder (Breakfast)", freq:7 },
{ name:"Pumpkin (Evening)", freq:7 },
{ name:"Eggs – 2 (Breakfast)", freq:7 },
{ name:"Whey + Banana (Post Workout)", freq:4 },
{ name:"Chicken – 200g Gym days", freq:4 },
{ name:"Fish", freq:2 }
],
instructions:`Protein Target: 100–110g/day ✔ Achieved.<br>
Drink 3L water daily.`
},

f19:{
name:"Sharmila – Healthy Weight Gain",
tasks:[
{ name:"Sesame (Morning)", freq:7 },
{ name:"Flax Powder (Breakfast)", freq:7 },
{ name:"Pumpkin (Evening)", freq:7 },
{ name:"Eggs – 2 (Breakfast)", freq:7 },
{ name:"Chicken", freq:3 },
{ name:"Fish", freq:2 },
{ name:"Mutton", freq:1 }
],
instructions:`Protein Target: 45–55g/day ✔ Achieved.<br>
Eat every 3–4 hrs.`
}

};

function showMember(key){
const content=document.getElementById("content");
content.innerHTML="";
const member=members[key];

const card=document.createElement("div");
card.className="card";
card.innerHTML=`<h2>${member.name}</h2>`;

member.tasks.forEach((task,index)=>{
const div=document.createElement("div");
div.className="task";

let html=`<h4>${task.name} (${task.freq}/week)</h4>`;

for(let i=0;i<task.freq;i++){
let id=`${key}_${index}_${i}`;
html+=`
<div class="upload-box">
<input type="file" accept="image/*" onchange="previewImage(event,'${id}')">
<div class="preview" id="preview_${id}"></div>
<button class="verify-btn" onclick="verify('${id}')">Verify</button>
<input type="checkbox" id="check_${id}" disabled>
</div>
`;
}

div.innerHTML=html;
card.appendChild(div);
});

const instructionDiv=document.createElement("div");
instructionDiv.className="instructions";
instructionDiv.innerHTML=member.instructions;
card.appendChild(instructionDiv);

const resetBtn=document.createElement("button");
resetBtn.className="reset-btn";
resetBtn.innerText="Reset Weekly";
resetBtn.onclick=()=>location.reload();
card.appendChild(resetBtn);

content.appendChild(card);
}

function previewImage(event,id){
const preview=document.getElementById("preview_"+id);
preview.innerHTML="";
const img=document.createElement("img");
img.src=URL.createObjectURL(event.target.files[0]);
preview.appendChild(img);
}

function verify(id){
const pass=prompt("Enter Admin Password");
if(pass===adminPassword){
document.getElementById("check_"+id).checked=true;
} else {
alert("Wrong Password");
}
}

showMember("m49");

</script>

</body>
</html>
