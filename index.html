<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Nutrition Weekly Tracker</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#4e73df,#1cc88a);
}

nav{
  display:flex;
  background:rgba(0,0,0,0.3);
}

nav button{
  flex:1;
  padding:14px;
  border:none;
  background:transparent;
  color:white;
  font-size:15px;
  cursor:pointer;
}

nav button:hover{
  background:rgba(255,255,255,0.2);
}

.container{padding:25px;}

.card{
  background:white;
  border-radius:15px;
  padding:25px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.task{
  background:#f4f7ff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  border-left:6px solid #4e73df;
}

.upload-box{
  margin-top:8px;
}

.preview img{
  width:75px;
  height:75px;
  object-fit:cover;
  border-radius:8px;
  margin-top:6px;
  border:2px solid #ddd;
}

.verify-btn{
  margin-top:6px;
  padding:5px 10px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.instructions{
  background:#eef7f2;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
  font-size:14px;
}

.reset-btn{
  margin-top:15px;
  padding:8px 15px;
  background:#dc3545;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
<button onclick="showMember('m49')">Appala Naidu</button>
<button onclick="showMember('f40')">SatyaVathi</button>
<button onclick="showMember('m22')">Vishnu Vardhan</button>
<button onclick="showMember('f19')">Sharmila</button>
</nav>

<div class="container">
<div id="content"></div>
</div>

<script>

const adminPassword="1234";

const members={

m49:{
name:"Appala Naidu – BP & Stamina",
tasks:[
{ name:"Chia/Sabja (1 tbsp soaked overnight – Morning empty stomach)", freq:7 },
{ name:"Flax Powder (1 tbsp mixed in breakfast)", freq:7 },
{ name:"Pumpkin Seeds (1 tbsp evening snack)", freq:7 },
{ name:"Eggs – 2 boiled (Breakfast)", freq:7 },
{ name:"Chicken OR 50g Soya OR 1.5 cup Chana (Lunch)", freq:3 },
{ name:"Fish OR 3 Eggs OR 50g Soya (Lunch)", freq:2 },
{ name:"Mutton OR Paneer OR Extra Dal+Peanut mix", freq:1 }
],
instructions:`
Target Protein: 75–90g/day ✔ Achieved.<br>
Reduce salt. Walk 20 mins after dinner. Drink 3L water.
`
},

f40:{
name:"SatyaVathi – Immunity & Strength",
tasks:[
{ name:"Sesame (1 tbsp light roasted – Morning)", freq:4 },
{ name:"Flax Powder (1 tbsp breakfast)", freq:7 },
{ name:"Pumpkin Seeds (1 tbsp evening)", freq:7 },
{ name:"Eggs – 2 boiled (Breakfast)", freq:7 },
{ name:"Chicken OR 50g Soya OR Black Chana", freq:3 },
{ name:"Fish OR 3 Eggs OR Sprouts", freq:2 },
{ name:"Mutton OR Paneer OR Extra Dal", freq:1 }
],
instructions:`
Target Protein: 50–60g/day ✔ Achieved.<br>
Do not skip meals. Add 1 tsp ghee in lunch.
`
},

m22:{
name:"Vishnu Vardhan – Muscle Gain",
tasks:[
{ name:"Chia (1 tbsp soaked – Morning)", freq:7 },
{ name:"Flax Powder (1 tbsp breakfast)", freq:7 },
{ name:"Pumpkin Seeds (1 tbsp evening)", freq:7 },
{ name:"Eggs – 2 boiled (Breakfast)", freq:7 },
{ name:"Whey + Banana (Post Workout)", freq:4 },
{ name:"Chicken 200g OR 50g Soya OR Chana (Gym days)", freq:4 },
{ name:"Fish OR 3 Eggs OR Soya", freq:2 }
],
instructions:`
Target Protein: 100–110g/day ✔ Achieved.<br>
Drink 3L water. Keep carbs sufficient for muscle.
`
},

f19:{
name:"Sharmila – Healthy Weight Gain",
tasks:[
{ name:"Sesame (1 tbsp morning)", freq:7 },
{ name:"Flax Powder (1 tbsp breakfast)", freq:7 },
{ name:"Pumpkin Seeds (1 tbsp evening)", freq:7 },
{ name:"Eggs – 2 boiled (Breakfast)", freq:7 },
{ name:"Chicken OR 50g Soya OR Chana", freq:3 },
{ name:"Fish OR Peanut Curry OR Soya", freq:2 },
{ name:"Mutton OR Paneer OR Extra Dal", freq:1 }
],
instructions:`
Target Protein: 45–55g/day ✔ Achieved.<br>
Eat every 3–4 hrs. Full rice portion allowed.
`
}

};

function showMember(key){
const content=document.getElementById("content");
content.innerHTML="";
const member=members[key];

const card=document.createElement("div");
card.className="card";
card.innerHTML=`<h2>${member.name}</h2>`;

member.tasks.forEach((task,index)=>{
const div=document.createElement("div");
div.className="task";

let html=`<h4>${task.name} (${task.freq}/week)</h4>`;

for(let i=0;i<task.freq;i++){
let id=`${key}_${index}_${i}`;
html+=`
<div class="upload-box">
<input type="file" accept="image/*" onchange="previewImage(event,'${id}')">
<div class="preview" id="preview_${id}"></div>
<button class="verify-btn" onclick="verify('${id}')">Verify</button>
<input type="checkbox" id="check_${id}" disabled>
</div>
`;
}

div.innerHTML=html;
card.appendChild(div);
});

const ins=document.createElement("div");
ins.className="instructions";
ins.innerHTML=member.instructions;
card.appendChild(ins);

const resetBtn=document.createElement("button");
resetBtn.className="reset-btn";
resetBtn.innerText="Reset Weekly";
resetBtn.onclick=()=>location.reload();
card.appendChild(resetBtn);

content.appendChild(card);
}

function previewImage(event,id){
const preview=document.getElementById("preview_"+id);
preview.innerHTML="";
const img=document.createElement("img");
img.src=URL.createObjectURL(event.target.files[0]);
preview.appendChild(img);
}

function verify(id){
const pass=prompt("Enter Admin Password");
if(pass==="1234"){
document.getElementById("check_"+id).checked=true;
}else{
alert("Wrong password");
}
}

showMember("m49");

</script>

</body>
</html>
