<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Nutrition Weekly Tracker</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#333;
}

nav{
  display:flex;
  background:rgba(0,0,0,0.3);
}

nav button{
  flex:1;
  padding:15px;
  border:none;
  background:transparent;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}
nav button:hover{background:rgba(255,255,255,0.2);}

.container{padding:25px;}

.card{
  background:white;
  border-radius:15px;
  padding:25px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  animation:fade 0.3s ease-in-out;
}

.task{
  background:#f7f8ff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  border-left:5px solid #667eea;
}

.checkbox-group{
  margin-top:10px;
}

.checkbox-group input{
  margin-right:6px;
  transform:scale(1.2);
}

.instructions{
  background:#eef1ff;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

.reset-btn{
  background:#dc3545;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
  margin-top:15px;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<nav>
<button onclick="showMember('m49')">Appala Naidu</button>
<button onclick="showMember('f40')">SatyaVathi</button>
<button onclick="showMember('m22')">Vishnu Vardhan</button>
<button onclick="showMember('f19')">Sharmila</button>
</nav>

<div class="container">
<div id="content"></div>
</div>

<script>

const adminPassword="1234";

const members={

m49:{
name:"Appala Naidu – BP & Stamina",
tasks:[
{ id:"49_chia", name:"Chia/Sabja (Morning Empty Stomach)", freq:7 },
{ id:"49_flax", name:"Flax (With Breakfast)", freq:7 },
{ id:"49_pumpkin", name:"Pumpkin Seeds (Evening)", freq:7 },
{ id:"49_egg", name:"Egg (Breakfast)", freq:7 },
{ id:"49_chicken", name:"Chicken (Lunch)", freq:3 },
{ id:"49_fish", name:"Fish (Lunch)", freq:2 },
{ id:"49_mutton", name:"Mutton (Lunch)", freq:1 }
],
instructions:`
<b>Daily Timing:</b><br>
Morning: Soaked chia/sabja.<br>
Breakfast: Egg + flax mixed in food.<br>
Lunch: Rice + dal + green veg + chicken/fish as per week plan.<br>
Evening: Pumpkin seeds.<br>
Dinner: Light meal.<br><br>
<b>Suggestions:</b><br>
Reduce salt. Walk 20 min after dinner. Drink 3L water daily.
`
},

f40:{
name:"SatyaVathi – Immunity & Strength",
tasks:[
{ id:"40_sesame", name:"Sesame (Morning)", freq:4 },
{ id:"40_flax", name:"Flax (Breakfast)", freq:7 },
{ id:"40_pumpkin", name:"Pumpkin (Evening)", freq:7 },
{ id:"40_egg", name:"Egg (Breakfast)", freq:7 },
{ id:"40_chicken", name:"Chicken", freq:3 },
{ id:"40_fish", name:"Fish", freq:2 },
{ id:"40_mutton", name:"Mutton", freq:1 }
],
instructions:`
<b>Daily Timing:</b><br>
Morning: Sesame (light roasted).<br>
Breakfast: Egg + flax.<br>
Lunch: Rice + dal + leafy veg.<br>
Evening: Pumpkin seeds.<br><br>
<b>Suggestions:</b><br>
Do not skip meals. Add 1 tsp ghee in lunch. Sleep before 11 PM.
`
},

m22:{
name:"Vishnu Vardhan – Gym & Muscle",
tasks:[
{ id:"22_chia", name:"Chia/Sabja (Morning)", freq:7 },
{ id:"22_flax", name:"Flax (Breakfast)", freq:7 },
{ id:"22_pumpkin", name:"Pumpkin (Evening)", freq:7 },
{ id:"22_egg", name:"Egg (Breakfast)", freq:7 },
{ id:"22_whey", name:"Whey (Post Workout)", freq:4 },
{ id:"22_chicken", name:"Chicken", freq:4 },
{ id:"22_fish", name:"Fish", freq:2 }
],
instructions:`
<b>Daily Timing:</b><br>
Morning: Chia/sabja soaked.<br>
Breakfast: Egg + flax.<br>
Post Gym: Whey + banana (only gym days).<br>
Lunch: Chicken/fish.<br>
Evening: Pumpkin seeds.<br><br>
<b>Suggestions:</b><br>
Drink 3L water. Do not skip carbs. Whey only on workout days.
`
},

f19:{
name:"Sharmila – Weight Gain",
tasks:[
{ id:"19_sesame", name:"Sesame (Morning)", freq:7 },
{ id:"19_flax", name:"Flax (Breakfast)", freq:7 },
{ id:"19_pumpkin", name:"Pumpkin (Evening)", freq:7 },
{ id:"19_egg", name:"Egg (Breakfast)", freq:7 },
{ id:"19_chicken", name:"Chicken", freq:3 },
{ id:"19_fish", name:"Fish", freq:2 },
{ id:"19_mutton", name:"Mutton", freq:1 }
],
instructions:`
<b>Daily Timing:</b><br>
Morning: Sesame.<br>
Breakfast: Egg + flax.<br>
Lunch: Full rice portion + dal + chicken/fish.<br>
Evening: Pumpkin seeds.<br><br>
<b>Suggestions:</b><br>
Never skip meals. Eat every 3-4 hours. Sleep 7-8 hours.
`
}

};

function showMember(key){
const content=document.getElementById("content");
content.innerHTML="";
const member=members[key];

const card=document.createElement("div");
card.className="card";

card.innerHTML=`<h2>${member.name}</h2>`;

member.tasks.forEach(task=>{
const div=document.createElement("div");
div.className="task";

let checkboxes="";
for(let i=0;i<task.freq;i++){
checkboxes+=`<input type="checkbox" onclick="verify(this,'${task.id}_${i}')">`;
}

div.innerHTML=`
<h4>${task.name} (${task.freq}/week)</h4>
<div class="checkbox-group">${checkboxes}</div>
`;

card.appendChild(div);
});

const instructionDiv=document.createElement("div");
instructionDiv.className="instructions";
instructionDiv.innerHTML=member.instructions;
card.appendChild(instructionDiv);

const resetBtn=document.createElement("button");
resetBtn.className="reset-btn";
resetBtn.innerText="Reset Weekly Checks";
resetBtn.onclick=()=>location.reload();
card.appendChild(resetBtn);

content.appendChild(card);
}

function verify(box,id){
if(!box.checked)return;
const pass=prompt("Enter Admin Password");
if(pass!==adminPassword){
alert("Wrong password");
box.checked=false;
}
}

showMember("m49");

</script>

</body>
</html>
