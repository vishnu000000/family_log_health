<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Nutrition Tracker</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
  background:#f2f4f8;
}

nav{
  position:sticky;
  top:0;
  display:flex;
  overflow-x:auto;
  background:#2c3e50;
}

nav button{
  flex:1;
  min-width:120px;
  padding:14px 8px;
  border:none;
  background:transparent;
  color:white;
  font-size:14px;
  font-weight:600;
}

nav button:active{
  background:rgba(255,255,255,0.2);
}

.container{
  padding:15px;
}

.card{
  background:white;
  border-radius:14px;
  padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card h2{
  margin-top:0;
  font-size:18px;
}

.task{
  background:#f9fbff;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border-left:4px solid #3498db;
}

.task h4{
  font-size:14px;
  margin:0 0 8px 0;
}

.upload-box{
  margin-bottom:10px;
}

input[type="file"]{
  width:100%;
  font-size:13px;
}

.preview img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
  margin-top:6px;
  border:1px solid #ddd;
}

.verify-btn{
  width:100%;
  margin-top:6px;
  padding:8px;
  font-size:14px;
  border:none;
  background:#27ae60;
  color:white;
  border-radius:8px;
}

.verify-btn:active{
  opacity:0.8;
}

input[type="checkbox"]{
  transform:scale(1.4);
  margin-top:8px;
}

.instructions{
  background:#eef7f2;
  padding:12px;
  border-radius:10px;
  font-size:13px;
  margin-top:15px;
}

.reset-btn{
  width:100%;
  margin-top:15px;
  padding:10px;
  border:none;
  background:#e74c3c;
  color:white;
  font-size:14px;
  border-radius:10px;
}

@media(min-width:768px){
  .container{
    max-width:700px;
    margin:auto;
  }
}
</style>
</head>

<body>

<nav>
<button onclick="showMember('m49')">Appala Naidu</button>
<button onclick="showMember('f40')">SatyaVathi</button>
<button onclick="showMember('m22')">Vishnu</button>
<button onclick="showMember('f19')">Sharmila</button>
</nav>

<div class="container">
<div id="content"></div>
</div>

<script>

const adminPassword="6061";

const members={

m49:{
name:"Appala Naidu – BP & Stamina",
tasks:[
{ name:"Chia/Sabja (1 tbsp soaked – Morning empty stomach)", freq:7 },
{ name:"Flax (1 tbsp mixed in breakfast)", freq:7 },
{ name:"Pumpkin Seeds (1 tbsp evening)", freq:7 },
{ name:"Eggs – 2 boiled (Breakfast)", freq:7 },
{ name:"Chicken OR 50g Soya OR 1.5 cup Chana (Lunch)", freq:3 },
{ name:"Fish OR 3 Eggs OR Soya (Lunch)", freq:2 },
{ name:"Mutton OR Paneer OR Extra Dal+Peanuts", freq:1 }
],
instructions:`Base rice+dal+veg assumed daily.<br>
Protein target 75–90g ✔.<br>
Reduce salt. Walk 20 mins daily.`
},

f40:{
name:"SatyaVathi – Immunity & Strength",
tasks:[
{ name:"Sesame (1 tbsp light roasted – Morning)", freq:4 },
{ name:"Flax (1 tbsp breakfast)", freq:7 },
{ name:"Pumpkin (1 tbsp evening)", freq:7 },
{ name:"Eggs – 2 boiled (Breakfast)", freq:7 },
{ name:"Chicken OR Soya OR Black Chana", freq:3 },
{ name:"Fish OR Sprouts OR 3 Eggs", freq:2 },
{ name:"Mutton OR Paneer OR Extra Dal", freq:1 }
],
instructions:`Base meals assumed daily.<br>
Protein 50–60g ✔.<br>
Do not skip meals. Add 1 tsp ghee.`
},

m22:{
name:"Vishnu – Muscle Gain",
tasks:[
{ name:"Chia/Sabja (1 tbsp soaked – Morning)", freq:7 },
{ name:"Flax Powder (1 tbsp breakfast)", freq:7 },
{ name:"Sunflower Seeds (1 tbsp lunch)", freq:7 },
{ name:"Pumpkin Seeds (1 tbsp evening)", freq:7 },
{ name:"Eggs – 2 boiled (Breakfast)", freq:7 },
{ name:"Whey + Banana (Post Workout)", freq:4 },
{ name:"Chicken 200g OR 50g Soya OR 1.5 cup Chana", freq:4 },
{ name:"Fish OR 3 Eggs OR Soya", freq:2 }
],
instructions:`Base meals assumed daily.<br>
Protein 100–110g ✔.<br>
Pumpkin added for recovery.<br>
Drink 3L water.`
},

f19:{
name:"Sharmila – Weight Gain",
tasks:[
{ name:"Sesame (1 tbsp morning)", freq:7 },
{ name:"Flax (1 tbsp breakfast)", freq:7 },
{ name:"Pumpkin (1 tbsp evening)", freq:7 },
{ name:"Eggs – 2 boiled (Breakfast)", freq:7 },
{ name:"Chicken OR Soya OR Chana", freq:3 },
{ name:"Fish OR Peanut Curry OR Soya", freq:2 },
{ name:"Mutton OR Paneer OR Extra Dal", freq:1 }
],
instructions:`Base meals assumed daily.<br>
Protein 45–55g ✔.<br>
Eat every 3–4 hrs.`
}

};

function showMember(key){
const content=document.getElementById("content");
content.innerHTML="";
const member=members[key];

const card=document.createElement("div");
card.className="card";
card.innerHTML=`<h2>${member.name}</h2>`;

member.tasks.forEach((task,index)=>{
const div=document.createElement("div");
div.className="task";

let html=`<h4>${task.name} (${task.freq}/week)</h4>`;

for(let i=0;i<task.freq;i++){
let id=`${key}_${index}_${i}`;
html+=`
<div class="upload-box">
<input type="file" accept="image/*" capture="camera" onchange="previewImage(event,'${id}')">
<div class="preview" id="preview_${id}"></div>
<button class="verify-btn" onclick="verify('${id}')">Verify</button>
<input type="checkbox" id="check_${id}" disabled>
</div>
`;
}

div.innerHTML=html;
card.appendChild(div);
});

const ins=document.createElement("div");
ins.className="instructions";
ins.innerHTML=member.instructions;
card.appendChild(ins);

const resetBtn=document.createElement("button");
resetBtn.className="reset-btn";
resetBtn.innerText="Reset Weekly";
resetBtn.onclick=()=>location.reload();
card.appendChild(resetBtn);

content.appendChild(card);
}

function previewImage(event,id){
const preview=document.getElementById("preview_"+id);
preview.innerHTML="";
const img=document.createElement("img");
img.src=URL.createObjectURL(event.target.files[0]);
preview.appendChild(img);
}

function verify(id){
const pass=prompt("Admin Password");
if(pass==="6061"){
document.getElementById("check_"+id).checked=true;
}else{
alert("Wrong password");
}
}

showMember("m49");

</script>

</body>
</html>
